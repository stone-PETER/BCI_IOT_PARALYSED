eeg:
  sampling_rate: 250
  channels: 3
  motor_imagery_channels: [0, 1, 2]
  epoch_length: 2.0
  baseline_length: 0.5
  overlap: 0.0

  motor_imagery:
    cue_onset: 0.0
    imagery_duration: 2.0
    classes: 3
    class_names: ["left_hand", "right_hand", "rest"]
    class_mapping: { 1: 0, 2: 1, 3: 2 }

preprocessing:
  bandpass:
    low_freq: 4.0
    high_freq: 40.0
    filter_order: 4
  reference: "CAR"
  normalization: "zscore"
  artifact_threshold: 100.0

model:
  architecture: "eegnet"
  nb_classes: 3
  chans: 3
  samples: 500
  dropoutRate: 0.5
  kernLength: 125
  F1: 8
  D: 2
  F2: 16
  norm_rate: 0.25
  dropoutType: "Dropout"

training:
  batch_size: 16
  epochs: 100
  learning_rate: 0.001
  validation_split: 0.2
  early_stopping:
    patience: 30
    restore_best_weights: true
  augmentation:
    enabled: true

commands:
  class_mapping:
    0: "TURN_LEFT"
    1: "TURN_RIGHT"
    2: "STOP"

api:
  host: "localhost"
  port: 5000
  debug: true
  endpoints:
    classify: "/classify"
    status: "/status"
    model_info: "/model_info"

paths:
  data_file: "bci_preprocessed_data.npz"
  model_save_path: "models/"
  model_filename: "eegnet_3class_motor_imagery.keras"
  logs_path: "logs/"

simulation:
  chunk_size: 250
  stream_delay: 0.1
  noise_level: 0.05

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  save_to_file: true
  log_filename: "bci_application.log"
