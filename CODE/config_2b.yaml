# Configuration for BCI Competition IV Dataset 2b
# Binary classification: Left hand vs Right hand
# 3 EEG channels: C3, Cz, C4

model:
  # Model Architecture Selection
  architecture: "eegnet" # Options: eegnet, deepconvnet, shallowconvnet, etc.

  # Model architecture (adjusted for 3 channels and binary classification)
  chans: 3 # Only 3 channels (C3, Cz, C4)
  samples: 1000 # 4 seconds at 250 Hz
  nb_classes: 2 # Binary: left hand vs right hand
  kernLength: 128  # 512ms window at 250Hz — captures full mu/beta rhythm cycles (was 64)
  F1: 16
  D: 2
  F2: 32
  dropoutRate: 0.5
  dropoutType: "Dropout"
  norm_rate: 0.25

training:
  # Training parameters
  batch_size: 32
  epochs: 300
  learning_rate: 0.001
  optimizer: "adam"

  # Early stopping
  early_stopping:
    monitor: "val_accuracy"
    patience: 50
    restore_best_weights: true

preprocessing:
  # Signal preprocessing - DISABLED for training
  # Reason: EEGNet's temporal Conv2D learns frequency filters internally;
  # benchmark .mat data is already clean. Preprocessing degraded accuracy
  # from 73% → 64% in testing. Real-time inference uses notch-only.
  enabled: false         # Master switch - raw data works best for EEGNet
  filter_low: 8          # Hz (kept for reference, not applied)
  filter_high: 30        # Hz (kept for reference, not applied)
  apply_laplacian: false # Disabled
  apply_car: false       # Disabled
  normalize: none        # No normalization in training pipeline

# Data Augmentation
augmentation:
  enabled: true # Enable data augmentation
  augmentation_factor: 1 # Number of augmented versions per original epoch
  time_shift_range: 0.05 # ±50ms time shifts
  noise_level: 0.08 # 8% noise level
  amplitude_range: [0.85, 1.15] # 85%-115% amplitude scaling
  time_warp_range: [0.96, 1.04] # 96%-104% time warping
  frequency_shift_range: 1.5 # ±1.5Hz frequency shifting
  channel_dropout_prob: 0.05 # 5% chance to drop each channel
  apply_probability: 0.7 # 70% chance to apply each augmentation

paths:
  data_path: "BCI/bci4_2b"
  model_save_path: "models"
  model_filename: "eegnet_2class_bci2b.keras"
  logs_path: "../logs"

logging:
  level: "INFO"
  save_to_file: true
  log_filename: "training_2b.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
